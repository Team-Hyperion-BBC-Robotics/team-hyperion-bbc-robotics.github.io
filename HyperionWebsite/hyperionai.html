<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hyperion AI · Team Hyperion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black:      #050a05;
      --black2:     #080e08;
      --green:      #00723f;
      --green-bright:#00c85a;
      --green-glow: #00ff6a;
      --white:      #f0fff4;
      --grey:       rgba(240,255,244,0.45);
      --border:     rgba(0,200,90,0.12);
      --card-bg:    rgba(6,12,6,0.95);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      display: flex; flex-direction: column;
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,200,90,0.015) 2px, rgba(0,200,90,0.015) 4px);
    }

    /* ── TOP BAR ── */
    .topbar {
      height: 56px; flex-shrink: 0;
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px;
      background: rgba(5,10,5,0.98);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.12em; color: var(--white);
    }
    .topbar-logo span { color: var(--green-bright); }
    .topbar-tag {
      font-size: 0.52rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--green-bright);
      border: 1px solid rgba(0,200,90,0.3);
      padding: 3px 8px; margin-left: 4px;
    }
    .topbar-status {
      margin-left: auto; display: flex; align-items: center; gap: 7px;
      font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(240,255,244,0.35);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green-bright);
      box-shadow: 0 0 6px var(--green-bright);
      animation: status-pulse 2s ease-in-out infinite;
    }
    @keyframes status-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .topbar-back {
      font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(240,255,244,0.35); text-decoration: none;
      border: 1px solid var(--border); padding: 4px 10px;
      transition: all 0.2s; margin-left: 12px;
    }
    .topbar-back:hover { color: var(--green-bright); border-color: rgba(0,200,90,0.4); }

    /* ── LAYOUT ── */
    .layout {
      display: flex; flex: 1; overflow: hidden;
      height: calc(100vh - 56px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.1em; color: var(--white);
      margin-bottom: 4px;
    }
    .sidebar-sub {
      font-size: 0.54rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(0,200,90,0.6);
    }
    .sidebar-section { padding: 14px 20px 6px; }
    .sidebar-section-label {
      font-size: 0.48rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(240,255,244,0.2); margin-bottom: 8px;
    }
    .quick-btn {
      display: block; width: 100%; text-align: left;
      background: transparent; border: 1px solid var(--border);
      color: rgba(240,255,244,0.6); cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.06em;
      padding: 8px 12px; margin-bottom: 4px;
      transition: all 0.15s; line-height: 1.45;
    }
    .quick-btn:hover {
      border-color: rgba(0,200,90,0.4);
      color: var(--green-bright);
      background: rgba(0,200,90,0.04);
    }
    .quick-btn .qb-arrow { color: var(--green-bright); margin-right: 6px; }
    .sidebar-divider {
      height: 1px; background: var(--border);
      margin: 10px 20px;
    }
    .kb-stat {
      padding: 10px 20px; display: flex; justify-content: space-between;
      align-items: center;
      font-size: 0.56rem; letter-spacing: 0.1em; color: rgba(240,255,244,0.25);
    }
    .kb-stat-val { color: var(--green-bright); font-size: 0.7rem; }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,200,90,0.2); border-radius: 2px; }

    /* ── MESSAGE BUBBLES ── */
    .msg { display: flex; gap: 12px; animation: msgIn 0.25s ease-out; max-width: 100%; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    .msg-avatar.ai-av {
      background: rgba(0,40,20,0.9);
      border: 1.5px solid var(--green-bright);
      color: var(--green-bright);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.08em;
    }
    .msg-avatar.user-av {
      background: rgba(20,40,20,0.6);
      border: 1.5px solid rgba(0,200,90,0.3);
      color: rgba(240,255,244,0.5);
    }
    .msg-body { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
    .msg.user .msg-body { align-items: flex-end; }
    .msg-sender {
      font-size: 0.48rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(240,255,244,0.2); padding: 0 2px;
    }
    .msg-bubble {
      padding: 12px 16px; line-height: 1.75;
      font-size: 0.8rem; letter-spacing: 0.03em;
    }
    .msg.ai .msg-bubble {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: rgba(240,255,244,0.8);
      border-left: 2px solid var(--green-bright);
      position: relative;
    }
    .msg.ai .msg-bubble::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, var(--green-bright), transparent);
      opacity: 0.4;
    }
    .msg.user .msg-bubble {
      background: rgba(0,60,25,0.4);
      border: 1px solid rgba(0,200,90,0.2);
      color: rgba(240,255,244,0.9);
      text-align: right;
    }
    .msg-bubble strong { color: var(--green-bright); font-weight: normal; }
    .msg-bubble .highlight { color: var(--green-glow); }
    .msg-bubble .tag {
      display: inline-block; font-size: 0.5rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--green-bright);
      border: 1px solid rgba(0,200,90,0.25); padding: 1px 5px; margin-left: 4px;
    }
    .msg-bubble ul { padding-left: 0; list-style: none; margin-top: 6px; }
    .msg-bubble ul li { padding: 2px 0; }
    .msg-bubble ul li::before { content: '→ '; color: var(--green-bright); }

    /* ── TYPING INDICATOR ── */
    .typing-indicator {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 2px solid var(--green-bright);
      width: fit-content;
    }
    .typing-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green-bright); opacity: 0.3;
      animation: tdot 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,60%,100%{opacity:0.3;transform:scale(1)} 30%{opacity:1;transform:scale(1.3)} }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 16px 24px;
      background: rgba(5,10,5,0.97);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-wrap { flex: 1; position: relative; }
    .input-prefix {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--green-bright); font-size: 0.75rem; pointer-events: none;
    }
    #chat-input {
      width: 100%; background: var(--card-bg);
      border: 1px solid rgba(0,200,90,0.2);
      color: var(--white); font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem; letter-spacing: 0.04em;
      padding: 12px 14px 12px 28px;
      outline: none; resize: none; min-height: 44px; max-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    #chat-input:focus { border-color: rgba(0,200,90,0.5); }
    #chat-input::placeholder { color: rgba(240,255,244,0.18); }
    #send-btn {
      background: var(--green-bright); color: #001a0e;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase;
      border: none; cursor: pointer;
      padding: 12px 20px; height: 44px; flex-shrink: 0;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
      transition: background 0.15s;
    }
    #send-btn:hover { background: var(--green-glow); }
    #send-btn:disabled { background: rgba(0,200,90,0.2); color: rgba(0,200,90,0.4); cursor: not-allowed; }
    .input-hint {
      font-size: 0.48rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(240,255,244,0.15); padding: 6px 0 0;
    }

    /* ── WELCOME ── */
    .welcome-msg .msg-bubble {
      min-width: 300px;
    }
    .welcome-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px;
    }
    .welcome-chip {
      background: rgba(0,114,63,0.08); border: 1px solid rgba(0,200,90,0.18);
      padding: 6px 10px; font-size: 0.58rem; letter-spacing: 0.06em;
      color: rgba(240,255,244,0.55); cursor: pointer; transition: all 0.15s;
    }
    .welcome-chip:hover {
      border-color: rgba(0,200,90,0.4); color: var(--green-bright);
      background: rgba(0,200,90,0.06);
    }

    /* ── CONFIDENCE BAR ── */
    .conf-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid rgba(0,200,90,0.08);
    }
    .conf-label { font-size: 0.48rem; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(240,255,244,0.2); }
    .conf-bar { flex: 1; height: 2px; background: rgba(0,200,90,0.08); }
    .conf-fill { height: 2px; background: var(--green-bright); transition: width 0.4s; }
    .conf-pct { font-size: 0.52rem; color: rgba(0,200,90,0.5); }

    /* ── SCROLLBAR OVERRIDE ── */
    * { scrollbar-width: thin; scrollbar-color: rgba(0,200,90,0.2) transparent; }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .chat-messages { padding: 16px; }
      .input-bar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="topbar-back" style="margin-left:0;margin-right:4px;color:var(--green-bright);border-color:rgba(0,200,90,0.35);display:flex;align-items:center;gap:6px;font-size:0.6rem;">
    <span style="font-size:0.85rem;line-height:1;">←</span> HOME

  <div class="topbar-logo">HYPERION <span>AI</span></div>

    <div class="kb-stat"><span>Knowledge topics</span><span class="kb-stat-val">12</span></div>

    <div class="input-bar">
      <div style="flex:1;">
        <div class="input-wrap">
          <span class="input-prefix">›</span>
          <textarea id="chat-input" rows="1" placeholder="Ask anything about Team Hyperion, our robot, or our competitions..." autocomplete="off" autocorrect="off" spellcheck="false"></textarea>

        <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>

      <button id="send-btn" onclick="sendMessage()">SEND</button>

  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════
   HYPERION AI — Knowledge Base Engine
   Pure JavaScript, no external APIs.
   Built around a structured knowledge base + weighted
   keyword matching + response templating.
═══════════════════════════════════════════════════════ */

/* ─── KNOWLEDGE BASE ─── */
const KB = [
  {
    id: 'team_identity',
    tags: ['team','hyperion','who','name','squad','group','us','we','our'],
    facts: [
      'Team Hyperion is a high school robotics team from Brisbane Boys\' College (BBC), located in Toowong, Queensland, Australia.',
      'The team competes in the RoboCup Junior Lightweight Soccer division.',
      'The team name is Hyperion — representing Brisbane Boys\' College on the world stage.',
      'The team colours are Green, White, and Black.',
      'Hyperion competes under the Australian flag at international competitions.',
    ],
    respond(q) {
      return `<strong>Team Hyperion</strong> is a competitive robotics squad from <strong>Brisbane Boys' College</strong> (BBC), Toowong, Queensland, Australia. We compete in the <strong>RoboCup Junior Lightweight Soccer</strong> division — green, white, and black, representing Australia internationally.`;
    }
  },
  {
    id: 'school',
    tags: ['school','college','bbc','brisbane','boys','college','toowong','queensland'],
    facts: [
      'Brisbane Boys\' College was established in 1902.',
      'It is a Presbyterian and Methodist school for boys in Brisbane\'s inner west, in Toowong.',
      'BBC has a strong tradition of academic excellence and innovation.',
      'The robotics team has been active since 2021.',
    ],
    respond(q) {
      return `<strong>Brisbane Boys' College</strong> was established in <strong class="highlight">1902</strong> in Toowong, Brisbane's inner west. It's a Presbyterian and Methodist school known for academic excellence. Team Hyperion has been BBC's RoboCup Junior robotics team since <strong>2021</strong>.`;
    }
  },
  {
    id: 'members',
    tags: ['members','who','team','people','students','sam','matthew','luke','thomas','names','roster'],
    facts: [
      'The four team members are Sam, Matthew, Luke, and Thomas.',
      'They are high school students at Brisbane Boys\' College.',
    ],
    respond(q) {
      return `Team Hyperion has <strong>four members</strong>:<ul><li>Sam</li><li>Matthew</li><li>Luke</li><li>Thomas</li></ul>All four are high school students at Brisbane Boys' College, each bringing different engineering and programming strengths to the team.`;
    }
  },
  {
    id: 'achievements',
    tags: ['achievements','results','won','win','place','podium','history','record','best','success','ranked','ranking'],
    facts: [
      '2025 RoboCup Junior World Championship: 14th place individually, 1st place in the Lightweight SuperTeam division.',
      '2025 Australian National Championship: Undefeated, reclaimed Australia\'s qualification spot for 2026.',
      'The team has 8 total podium finishes across their competition history.',
      'They have competed for 5+ years across multiple divisions.',
      'They have made 2 national competition appearances.',
    ],
    respond(q) {
      return `Hyperion's standout achievements:<ul><li><strong class="highlight">1st Place</strong> — Lightweight SuperTeam, 2025 RoboCup Junior Worlds (Salvador, Brazil)</li><li><strong>14th Place</strong> — Individual, 2025 Worlds</li><li><strong class="highlight">Undefeated</strong> — 2025 Australian National Championship</li><li><strong>8×</strong> total podium finishes across our history</li><li><strong>2×</strong> National competition appearances</li></ul>We reclaimed Australia's 2026 World Championship qualification spot at Nationals.`;
    }
  },
  {
    id: 'worlds_2025',
    tags: ['2025','worlds','world','championship','international','brazil','salvador','bahia'],
    facts: [
      'The 2025 RoboCup Junior World Championship was held in Salvador, Bahia, Brazil.',
      'Hyperion placed 14th individually at the 2025 Worlds.',
      'Hyperion placed 1st in the Lightweight SuperTeam division at the 2025 Worlds.',
      'This was Brisbane Boys\' College\'s first time representing Australia at RoboCup Junior Worlds.',
    ],
    respond(q) {
      return `At the <strong>2025 RoboCup Junior World Championship</strong> in <strong>Salvador, Bahia, Brazil</strong>:<ul><li>📍 First-ever Worlds appearance for BBC robotics</li><li><strong class="highlight">1st Place</strong> — Lightweight SuperTeam division</li><li><strong>14th Place</strong> — Individual competition</li></ul>A historic result — the Lightweight SuperTeam title was a major milestone for Australian RoboCup Junior.`;
    }
  },
  {
    id: 'worlds_2026',
    tags: ['2026','worlds','world','championship','international','incheon','korea','south','upcoming','next','future'],
    facts: [
      'The 2026 RoboCup Junior World Championship will be held in Incheon, South Korea.',
      'Hyperion qualified for the 2026 Worlds by going undefeated at the 2025 Australian Nationals.',
      'They are preparing with upgraded hardware and refined strategy for 2026.',
      'Their goal for 2026 is to improve their individual ranking and defend the SuperTeam title.',
    ],
    respond(q) {
      return `The <strong>2026 RoboCup Junior World Championship</strong> will be held in <strong class="highlight">Incheon, South Korea</strong>. We qualified by going <strong>undefeated</strong> at the 2025 Australian Nationals. For 2026, we're heading there with:<ul><li>Upgraded hardware systems</li><li>Refined autonomous strategy</li><li>Experience from Brazil</li></ul>The goal: improve our individual ranking and defend the SuperTeam title.`;
    }
  },
  {
    id: 'nationals_2025',
    tags: ['nationals','national','australia','australian','2025','undefeated','qualification','qualify'],
    facts: [
      'At the 2025 Australian National Championship, Hyperion was undefeated.',
      'No losses at the 2025 Nationals.',
      'This performance secured Australia\'s qualification for the 2026 World Championship.',
    ],
    respond(q) {
      return `At the <strong>2025 Australian National Championship</strong>, Team Hyperion went <strong class="highlight">completely undefeated</strong> — zero losses. This dominant performance secured <strong>Australia's qualification spot</strong> for the 2026 RoboCup Junior World Championship in Incheon, South Korea.`;
    }
  },
  {
    id: 'robot_overview',
    tags: ['robot','machine','build','design','hardware','custom','how','built'],
    facts: [
      'The robot is a custom-built holonomic robot for RoboCup Junior Lightweight Soccer.',
      'It uses 4 omni-directional wheels for full holonomic movement.',
      'Primary brain is a Teensy 4.1 ARM Cortex-M7 running at 600 MHz.',
      'Ball detection uses a ring of 12 TSSP77038 infrared sensors.',
      'Goal detection uses an OpenMV RT camera.',
      'An BNO055 IMU maintains heading stability.',
      'The two robots communicate via Bluetooth (HC-05 modules).',
      'A solenoid kicker fires when a two-condition trigger is met.',
    ],
    respond(q) {
      return `The Hyperion robot is a fully <strong>custom-built holonomic soccer robot</strong>. Key systems:<ul><li><strong>Brain:</strong> Teensy 4.1 (ARM Cortex-M7 @ 600 MHz)</li><li><strong>Movement:</strong> 4× omni-directional wheels (full holonomic)</li><li><strong>Ball detection:</strong> 12× TSSP77038 IR sensors (ring)</li><li><strong>Goal detection:</strong> OpenMV RT machine vision camera</li><li><strong>Orientation:</strong> BNO055 IMU (9-axis)</li><li><strong>Comms:</strong> HC-05 Bluetooth (robot-to-robot)</li><li><strong>Kicker:</strong> Solenoid actuator</li></ul>`;
    }
  },
  {
    id: 'teensy',

/* ─── NLP ENGINE ─── */
function tokenize(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(t => t.length > 1);
}

const STOPWORDS = new Set(['the','is','are','was','were','a','an','of','in','at','to','for','and','or','it','how','what','when','where','who','why','do','does','did','can','tell','me','us','about','your','our','team','please','know','could','would','like']);

function scoreEntry(tokens, entry) {
  let score = 0;
  const meaningful = tokens.filter(t => !STOPWORDS.has(t));
  for (const tok of meaningful) {
    for (const tag of entry.tags) {
      if (tag === tok) { score += 3; continue; }
      if (tag.includes(tok) || tok.includes(tag)) score += 1;
    }
  }
  // Boost for fact keyword matches
  for (const tok of meaningful) {
    for (const fact of entry.facts) {
      if (fact.toLowerCase().includes(tok)) score += 0.5;
    }
  }
  return score;
}

function query(userText) {
  const tokens = tokenize(userText);
  let best = { score: 0, entry: null };

  for (const entry of KB) {
    if (entry.id === 'fallback') continue;
    const s = scoreEntry(tokens, entry);
    if (s > best.score) { best.score = s; best.entry = entry; }
  }

  const fallback = KB.find(e => e.id === 'fallback');
  const confidence = Math.min(Math.round((best.score / Math.max(1, tokens.length * 2)) * 100), 98);

  if (!best.entry || best.score < 1) {
    return { html: fallback.respond(userText), confidence: 0 };
  }
  return { html: best.entry.respond(userText), confidence };
}

/* ─── CHAT UI ─── */
const chatEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('chat-input');
let msgCount = 0;

function appendMsg(role, htmlContent, confidence) {
  msgCount++;
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role + (msgCount === 1 ? ' welcome-msg' : '');

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar ' + (role === 'ai' ? 'ai-av' : 'user-av');
  avatarEl.textContent = role === 'ai' ? 'AI' : '›';

  const bodyEl = document.createElement('div');
  bodyEl.className = 'msg-body';

  const senderEl = document.createElement('div');
  senderEl.className = 'msg-sender';
  senderEl.textContent = role === 'ai' ? 'Hyperion AI' : 'You';

  const bubbleEl = document.createElement('div');
  bubbleEl.className = 'msg-bubble';
  bubbleEl.innerHTML = htmlContent;

  if (role === 'ai' && typeof confidence === 'number') {
    const confRow = document.createElement('div');
    confRow.className = 'conf-row';
    confRow.innerHTML = `
      <span class="conf-label">Match</span>
      <div class="conf-bar"><div class="conf-fill" style="width:${confidence}%"></div></div>
      <span class="conf-pct">${confidence}%</span>
    `;
    bubbleEl.appendChild(confRow);
  }

  bodyEl.appendChild(senderEl);
  bodyEl.appendChild(bubbleEl);
  wrap.appendChild(avatarEl);
  wrap.appendChild(bodyEl);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return wrap;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'typing-msg';
  const av = document.createElement('div');
  av.className = 'msg-avatar ai-av';
  av.textContent = 'AI';
  const body = document.createElement('div');
  body.className = 'msg-body';
  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = 'Hyperion AI';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  body.appendChild(sender);
  body.appendChild(ind);
  wrap.appendChild(av);
  wrap.appendChild(body);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text);
  showTyping();

  // Simulate processing time (feels more natural)
  const delay = 400 + Math.random() * 600;
  setTimeout(() => {
    removeTyping();
    const result = query(text);
    appendMsg('ai', result.html, result.confidence);
    document.getElementById('send-btn').disabled = false;
    inputEl.focus();
  }, delay);
}

function quickAsk(text) {
  inputEl.value = text;
  sendMessage();
}

// Input events
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
